name: CI Pipeline - Test and Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
        run: |
          pytest backend/tests
  build-and-push:
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: wenxuanalex/is631-backend:latest

  deploy:
    needs: build-and-push
    if: ${{ !cancelled() && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker stop my-app || true && docker rm my-app || true
            docker pull wenxuanalex/is631-backend:latest
            docker run -d --name my-app --restart unless-stopped -p 80:8000 \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e COGNITO_REGION="${{ secrets.COGNITO_REGION }}" \
              -e COGNITO_USER_POOL_ID="${{ secrets.COGNITO_USER_POOL_ID }}" \
              -e COGNITO_CLIENT_ID="${{ secrets.COGNITO_CLIENT_ID }}" \
              -e COGNITO_CLIENT_SECRET="${{ secrets.COGNITO_CLIENT_SECRET }}" \
              -e COGNITO_ADMIN_ROLE="${{ secrets.COGNITO_ADMIN_ROLE }}" \
              -e COGNITO_USER_ROLE="${{ secrets.COGNITO_USER_ROLE }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e LLM_MODEL="${{ secrets.LLM_MODEL }}" \
              -e LLM_TEMPERATURE="${{ secrets.LLM_TEMPERATURE }}" \
              -e LLM_MAX_TOKENS="${{ secrets.LLM_MAX_TOKENS }}" \
              -e LLM_TIMEOUT="${{ secrets.LLM_TIMEOUT }}" \
              -e LLM_MAX_RETRIES="${{ secrets.LLM_MAX_RETRIES }}" \
              wenxuanalex/is631-backend:latest
