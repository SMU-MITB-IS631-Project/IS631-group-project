[pytest]
# Repository-level pytest config to avoid collecting legacy/manual scripts.
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Keep default collection focused on maintained automated backend tests.
testpaths =
    backend/tests

addopts = -v --tb=short --strict-markers --color=yes -ra -W ignore::DeprecationWarning
asyncio_mode = auto
